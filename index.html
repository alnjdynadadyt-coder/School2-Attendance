<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الحضور - المدرسة الثانية</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" style="text-align:center;">
    <h2 style="color:#007bff;">المديرية العامة لتربية القادسية - اعدادية النجدين للبنين - 2026-2027</h2>
</div>

<div class="container">
    <h3>تسجيل الحضور</h3>
    <div class="input-group">
        <input type="text" id="empCode" placeholder="كود الموظف">
        <select id="status"><option>حاضر</option><option>مجاز</option><option>غائب</option></select>
        <input type="time" id="customTime">
        <button onclick="registerAttendance()" style="background:#007bff; color:white;">تسجيل</button>
    </div>
    <table id="mainTable">
        <thead><tr><th>الاسم</th><th>التاريخ</th><th>الحضور</th><th>الحالة</th><th>إجراء</th></tr></thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<div class="container">
    <h3>إدارة الموظفين</h3>
    <div class="input-group">
        <input type="text" id="newEmpCode" placeholder="الكود">
        <input type="text" id="newEmpName" placeholder="الاسم">
        <select id="newEmpType"><option value="مدرس">مدرس</option><option value="موظف">موظف</option><option value="إداري">إداري</option></select>
        <button onclick="addEmployee()" style="background:#6c757d; color:white;">حفظ / تحديث</button>
    </div>
    <table><thead><tr><th>الكود</th><th>الاسم</th><th>النوع</th><th>إجراء</th></tr></thead><tbody id="employeesTable"></tbody></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, onSnapshot, setDoc, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyC2KnDmYoQjPKCe8uvf1A2k3yU1hhN9Q2s",
        projectId: "school2attendance",
        storageBucket: "school2attendance.firebasestorage.app",
        messagingSenderId: "20112446244",
        appId: "1:20112446244:web:4431fbdb91bb41ff8859b1"
    }));

    document.getElementById('customTime').value = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit', hour12: false});

    window.registerAttendance = async () => {
        const code = document.getElementById('empCode').value;
        const date = new Date().toISOString().split('T')[0];
        const statusRaw = document.getElementById('status').value;
        const timeInput = document.getElementById('customTime').value;
        
        const empSnap = await getDoc(doc(db, "employees", code));
        if (!empSnap.exists()) { alert("الكود غير موجود"); return; }
        
        const empData = empSnap.data();
        let status = statusRaw;
        
        if (status === "حاضر") {
            let limit = "08:05";
            if (empData.type === "موظف") limit = "07:10";
            if (empData.type === "إداري") limit = "07:40";
            if (timeInput > limit) status = "متأخر";
        }

        await addDoc(collection(db, "attendance"), { empCode: code, name: empData.name, status, time: timeInput, date });
        alert("تم التسجيل كـ: " + status);
    };

    window.addEmployee = async () => {
        const code = document.getElementById('newEmpCode').value;
        const name = document.getElementById('newEmpName').value;
        const type = document.getElementById('newEmpType').value;
        if(code && name) { await setDoc(doc(db, 'employees', code), { name, type }); alert("تم حفظ الموظف"); }
    };

    window.deleteAtt = (id) => deleteDoc(doc(db, 'attendance', id));
    window.deleteEmp = (id) => deleteDoc(doc(db, 'employees', id));

    onSnapshot(collection(db, "employees"), snap => {
        let rows = "";
        snap.forEach(d => { rows += `<tr><td>${d.id}</td><td>${d.data().name}</td><td>${d.data().type}</td><td><button class="btn-del" onclick="deleteEmp('${d.id}')">حذف</button></td></tr>`; });
        document.getElementById('employeesTable').innerHTML = rows;
    });
</script>
</body>
</html>
